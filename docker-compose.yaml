services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        environment:
            DATABASE_URL: postgresql://postgres:cu29hj8an5@db:5432/postgres?schema=public
            SECRET_KEY: ${SECRET_KEY}
        depends_on:
            - db
        volumes:
            - .:/app
            - /app/node_modules

    db:
        image: postgres:15
        restart: always
        shm_size: 128mb
        volumes:
            - type: tmpfs
              target: /dev/shm
              tmpfs:
                  size: 128mb
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: cu29hj8an5
            POSTGRES_DB: postgres
        ports:
            - "5432:5432"

    adminer:
        image: adminer
        restart: always
        ports:
            - "8080:8080"
